name: CI/CD - Test, Build, Push, Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita dois deploys concorrentes em producao.
concurrency: production

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  IMAGE_TAG: sha-${{ github.sha }}
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/iafiliado-v2-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/iafiliado-v2-frontend

jobs:
  test-backend:
    name: Test - Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret
          CORS_ORIGINS: http://localhost:3000
        run: npm test

  build-push:
    name: Build & Push - Docker images
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy - Server (SSH + docker compose)
    runs-on: ubuntu-latest
    needs: [build-push]
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "bash -se" <<EOF
          set -euo pipefail

          cd ${{ secrets.DEPLOY_PATH }}

          # Hardening: CORS explicito para producao
          if ! grep -Eq '^CORS_ORIGINS=.+$' backend/.env; then
            echo "Erro: CORS_ORIGINS ausente ou vazio em backend/.env"
            exit 1
          fi
          if grep -Eq '^CORS_ORIGINS=.*localhost' backend/.env; then
            echo "Erro: CORS_ORIGINS contem localhost em ambiente de producao"
            exit 1
          fi

          # Seguranca: este pipeline assume docker-compose.yml com image: ...:\${IMAGE_TAG} (nao build:)
          if grep -Eq '^[[:space:]]*build:' docker-compose.yml; then
            echo "Erro: docker-compose.yml ainda usa build:. Troque para image: e use IMAGE_TAG (ex: sha-...)."
            exit 1
          fi

          export IMAGE_TAG="${IMAGE_TAG}"
          export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          DOCKERHUB_USERNAME="${DOCKERHUB_USERNAME}" IMAGE_TAG="${IMAGE_TAG}" docker compose pull
          DOCKERHUB_USERNAME="${DOCKERHUB_USERNAME}" IMAGE_TAG="${IMAGE_TAG}" docker compose up -d --remove-orphans

          docker compose ps
          wget -q --spider "http://localhost:3000/health"
          EOF
