name: CI/CD - Test, Build, Push, Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita dois deploys concorrentes em producao.
concurrency: production

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  IMAGE_TAG: sha-${{ github.sha }}
  # O user vem do secret DOCKERHUB_USERNAME (não hardcode).
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/iafiliado-v2-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/iafiliado-v2-frontend

jobs:
  test-backend:
    name: Test - Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret
          CORS_ORIGINS: http://localhost:3000
        run: npm test

  build-push:
    name: Build & Push - Docker images
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy - Server (SSH + docker compose)
    runs-on: ubuntu-latest
    needs: [build-push]
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          SERVER_HOST="${{ secrets.SERVER_HOST }}"
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          if [ -z "$SERVER_HOST" ] || [ -z "$SERVER_PORT" ]; then
            echo "Erro: secrets SERVER_HOST/SERVER_PORT nao configurados."
            exit 1
          fi

          # Pode falhar se firewall bloquear SSH a partir do GitHub Runner.
          for i in 1 2 3; do
            echo "ssh-keyscan tentativa $i/3 em ${SERVER_HOST}:${SERVER_PORT}..."
            ssh-keyscan -T 10 -H -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/tmp/ssh-keyscan.err && break
            cat /tmp/ssh-keyscan.err || true
            sleep 2
          done

          if ! ssh-keygen -F "$SERVER_HOST" >/dev/null 2>&1; then
            echo "Erro: nao foi possivel obter host key via ssh-keyscan."
            echo "Causas comuns: porta SSH bloqueada para IPs do GitHub Actions, SERVER_HOST/PORT incorretos, ou servidor offline."
            exit 1
          fi

      - name: Deploy to server
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "bash -se" <<EOF
          set -euo pipefail

          cd ${{ secrets.DEPLOY_PATH }}

          # Garante que o servidor esteja com o compose/workflow mais recente
          # (evita falhar o deploy por ainda estar com docker-compose.yml antigo).
          if [ -d .git ]; then
            git pull --ff-only
          fi

          # Hardening: CORS explicito para producao
          if ! grep -Eq '^CORS_ORIGINS=.+$' backend/.env; then
            echo "Erro: CORS_ORIGINS ausente ou vazio em backend/.env"
            exit 1
          fi
          if grep -Eq '^CORS_ORIGINS=.*localhost' backend/.env; then
            echo "Erro: CORS_ORIGINS contem localhost em ambiente de producao"
            exit 1
          fi

          # Seguranca: este pipeline assume docker-compose.yml com image: ...:\${IMAGE_TAG} (nao build:)
          if grep -Eq '^[[:space:]]*build:' docker-compose.yml; then
            echo "Erro: docker-compose.yml ainda usa build:. Troque para image: e use IMAGE_TAG (ex: sha-...)."
            exit 1
          fi

          export IMAGE_TAG="${IMAGE_TAG}"
          export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          docker compose pull
          docker compose up -d --remove-orphans

          docker compose ps
          wget -q --spider "http://localhost:3000/health"
          EOF
