server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Oculta versão do nginx no header Server (evita exposição em scanners)
    server_tokens off;

    # Content-Security-Policy restritivo (mitiga XSS)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://iafiliado.com https://dev.iafiliado.com;" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache de assets estáticos (JS, CSS, imagens)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy para a API do backend
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — qualquer rota desconhecida serve o index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
